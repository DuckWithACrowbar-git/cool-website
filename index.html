<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Attraction of the Day!</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" type="text/css" href="http://fonts.googleapis.com/css?family=Ubuntu:regular,bold&subset=Latin">
</head>
<body>
  <h2 class="title">Tourist Attraction of the Day is:</h2>
  <div id="main"></div>

  
</body>
<style>
:root{
  --backg: rgba(31, 109, 193, 0.881);
  --color2: rgb(235, 239, 240);
  --white: rgb(255, 255, 255);
  --mfont: Ubuntu;
  --scale:4;
}

html{
  background-color: black;
  animation-delay: 1s;
  animation-duration: 0.75s;
  animation-iteration-count: 1;
  animation-fill-mode: forwards;
  animation-name: background_to_white;
}


.title{
  opacity: 0;
  margin: auto;
  padding-top:20px;
  width: fit-content;
  height: fit-content;
  animation-delay: 1.25s;
  justify-content: center;
  animation-duration: 0.5s;
  font-family: var(--mfont);
  animation-name: title_load;
  animation-fill-mode: forwards;
}

#main{
  opacity: 0;
  margin: auto;
  padding-top: 50px;
  width: fit-content;
  height: fit-content;
  transform: scale(1.5);
  animation-delay: 2.5s;
  justify-content: center;
  font-family: var(--font);
  animation-duration: 0.5s;
  animation-name: content_load;
  animation-fill-mode: forwards;
}

/* Separate section for @keyframes rules */

@keyframes background_to_white {
  0%{background-color: black;}
  100%{background-color: var(--backg);}
}


@keyframes title_load {
  0%{opacity: 0; transform: scale(0.01) rotate(180deg);}
  100%{opacity: 1; transform: scale(1) rotate(360deg);}
}


@keyframes content_load {
  0%{opacity: 0;}
  100%{opacity: 1;}
}

</style>
<script>
  document.documentElement.scrollTop = 0;
  let attractions = ["test"]
  const randomItem = attractions[Math.floor(Math.random() * attractions.length)];
  const mainDiv = document.getElementById("main");
  mainDiv.textContent += randomItem;
</script>
</html>
